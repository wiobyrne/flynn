# Personal Assistant Bot — Configuration

vault_path: "/home/wiobyrne/Documents/wiobyrne"

default_domain: "self"

timezone: "America/New_York"

# Separate briefing disabled — morning check-in now includes compact status
briefing:
  time: "07:00"
  enabled: false

weekly:
  time: "17:00"   # sends on Fridays at this time
  enabled: true

checkins:
  morning:
    time: "07:00"
    enabled: true
  evening:
    time: "18:00"
    enabled: true

ollama:
